name: Build, Push and Deploy Frontend to Cloud Run - UAT

on:
  push:
    branches:
      - lmsUat-13-05-2026
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v3

      # ── 2. Setup Node ─────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Generate .env.production dynamically ───────────
      - name: Create .env.production
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env.production
          cat .env.production

      # ── 5. Build Vite app (reads .env.production) ─────────
      - name: Build React App
        run: npm run build

      # ── 6. Login to Docker Hub ────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 7. Build Docker Image ─────────────────────────────
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/lms-frontend-uat:latest .

      # ── 8. Push Docker Image ──────────────────────────────
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/lms-frontend-uat:latest

      # ── 9. Authenticate to GCP ────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 10. Set up gcloud CLI ─────────────────────────────
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ── 11. Deploy to Cloud Run ───────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy lms-frontend-uat \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/lms-frontend-uat:latest \
            --platform managed \
            --region asia-south1 \
            --service-account github-deployer@lms-aries.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --port 8080
